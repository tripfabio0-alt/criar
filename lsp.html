<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador LSP - Solvix Pro</title>
    <style>
        body { background: #05050a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card { background: #0d1117; border: 1px solid #30363d; border-radius: 12px; padding: 0; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-header { background: #161b22; padding: 12px 20px; border-bottom: 1px solid #30363d; color: #58a6ff; font-size: 11px; font-weight: bold; letter-spacing: 1px; }
        textarea { width: 100%; height: 250px; background: transparent; color: white; border: none; padding: 20px; font-size: 16px; font-family: monospace; outline: none; box-sizing: border-box; resize: vertical; }
        .footer { padding: 15px 20px; background: #090c10; border-top: 1px solid #30363d; display: flex; justify-content: flex-end; }
        button { background: #238636; color: white; border: none; padding: 12px 30px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #result { margin-top: 25px; width: 100%; }
        .result-box { background: #010409; border: 1px solid #30363d; border-radius: 8px; padding: 20px; position: relative; }
        pre { margin: 0; color: #d2a8ff; font-size: 14px; white-space: pre-wrap; line-height: 1.6; }
        .back-link { color: #8b949e; text-decoration: none; font-size: 13px; border: 1px solid #30363d; padding: 6px 12px; border-radius: 6px; }
        .back-link:hover { border-color: #8b949e; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 style="margin:0; font-size: 22px;">Gerador LSP</h1>
                <p style="margin:5px 0 0 0; font-size: 12px; color: #8b949e;">Modo Independente de Alta Performance</p>
            </div>
            <a href="/app/dashboard" class="back-link">← Voltar ao Sistema</a>
        </div>

        <div class="card">
            <div class="card-header">REQUISIÇÃO DE LÓGICA</div>
            <textarea id="prompt" placeholder="Digite sua lógica aqui..."></textarea>
            <div class="footer">
                <button id="generate-btn">GERAR CÓDIGO SENIOR</button>
            </div>
        </div>

        <div id="result"></div>
    </div>

    <script>
        const btn = document.getElementById('generate-btn');
        const promptInput = document.getElementById('prompt');
        const resultDiv = document.getElementById('result');

        btn.addEventListener('click', async () => {
            const text = promptInput.value.trim();
            if (!text) return;

            btn.disabled = true;
            btn.innerText = "GERANDO...";

            try {
                const response = await fetch('/api/gerar-sql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: "[MODO LSP] " + text })
                });

                const data = await response.json();
                const raw = data.resultado;
                
                const getTag = (tag) => {
                    const s = raw.indexOf("##" + tag + "##");
                    if (s === -1) return "";
                    const after = s + tag.length + 4;
                    const e = raw.indexOf("##", after);
                    return (e === -1 ? raw.slice(after) : raw.slice(after, e)).trim();
                };

                const content = getTag("CONTEUDO");

                resultDiv.innerHTML = `
                    <div class="result-box">
                        <div style="color: #8b949e; font-size: 11px; margin-bottom: 10px;">CÓDIGO GERADO</div>
                        <pre>${content}</pre>
                    </div>
                `;
            } catch (err) {
                alert("Erro ao conectar com a IA");
            } finally {
                btn.disabled = false;
                btn.innerText = "GERAR CÓDIGO SENIOR";
            }
        });
    </script>
</body>
</html>
