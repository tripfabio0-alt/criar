<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | crIArc Consultoria Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/consultoria/css/app.css">
</head>
<body class="auth-body" style="opacity: 0; transition: opacity 0.3s ease;">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-icon">▲</span> crIArc
                </div>
                <h2>Consultoria Pro</h2>
                <p>Faça login para acessar o ecossistema</p>
            </div>
            
            <div class="auth-actions">
                <button class="btn-google" id="loginBtn" onclick="handleGoogleLogin()">
                    <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" alt="Google Logo" class="google-icon">
                    Continuar com Google
                </button>
            </div>

            <div class="auth-footer">
                <p>Ao continuar, você concorda com nossos Termos de Serviço.</p>
                <a href="/" class="back-link">← Voltar para o Site</a>
            </div>
        </div>
    </div>

    <!-- Supabase SDK & Cliente -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabaseClient.js"></script>

    <script>
        async function handleGoogleLogin() {
            try {
                const { data, error } = await window.supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        scopes: 'https://www.googleapis.com/auth/calendar.events',
                        redirectTo: window.location.origin + '/consultoria/dashboard.html'
                    }
                });
                
                if (error) {
                    console.error("Erro no Login:", error.message);
                    alert("Erro ao conectar com Google. Verifique o console.");
                }
            } catch (err) {
                console.error("Erro inesperado:", err);
            }
        }
        
        // Se já estiver logado, pula pro dashboard
        window.onload = async () => {
            const { data } = await window.supabaseClient.auth.getSession();
            if (data.session) {
                window.location.href = '/consultoria/dashboard.html';
            } else {
                document.body.style.opacity = '1';
            }
        };
    </script>
</body>
</html>
