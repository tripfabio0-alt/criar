<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solvix Pro - Engenharia Senior</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030408;
            --card: #0a0c14;
            --border: #1e293b;
            --primary: #10b981;
            --secondary: #6366f1;
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            padding: 0;
            line-height: 1.6;
        }

        .navbar {
            height: 64px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: rgba(3, 4, 8, 0.8);
            backdrop-blur: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .logo span { color: var(--primary); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        .input-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .label { font-size: 12px; font-weight: 700; color: var(--primary); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

        textarea {
            width: 100%;
            height: 120px;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 18px;
            resize: none;
            outline: none;
            padding: 0;
            margin-top: 10px;
        }

        .actions { display: flex; justify-content: flex-end; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; }

        .btn-generate {
            background: linear-gradient(135deg, var(--primary), #059669);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); }
        .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; display: none; }
        @media (max-width: 900px) { .results-grid { grid-template-columns: 1fr; } }

        .result-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; }
        .result-header { padding: 16px 24px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .result-body { padding: 24px; flex: 1; font-size: 14px; }

        pre { margin: 0; white-space: pre-wrap; font-family: 'Fira Code', monospace; color: #a5d6ff; line-height: 1.5; }
        .explanation-text { color: var(--muted); white-space: pre-wrap; }

        .btn-copy {
            background: var(--border);
            color: var(--text);
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-copy:hover { background: #334155; }

        .loading-shimmer {
            height: 200px;
            background: linear-gradient(90deg, var(--card) 25%, #1e293b 50%, var(--card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 16px;
            display: none;
        }

        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .error-toast { background: #450a0a; border: 1px solid #991b1b; color: #fecaca; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">SOLVIX<span>PRO</span></div>
        <a href="/app/dashboard" style="color: var(--muted); text-decoration: none; font-size: 13px;">Voltar ao Dashboard</a>
    </nav>

    <div class="container">
        <div class="error-toast" id="error-toast"></div>

        <div class="input-section">
            <div class="label"><i data-lucide="cpu"></i> Requisitar Inteligência de Engenharia</div>
            <textarea id="prompt" placeholder="Descreva a regra de negócio ou lógica LSP desejada..."></textarea>
            <div class="actions">
                <button id="generate-btn" class="btn-generate">
                    <i data-lucide="zap"></i> GERAR SOLUÇÃO SÊNIOR
                </button>
            </div>
        </div>

        <div id="loading" class="loading-shimmer"></div>

        <div id="results-grid" class="results-grid">
            <div class="result-card">
                <div class="result-header">
                    <div class="label" style="margin:0;"><i data-lucide="book-open"></i> Análise de Engenharia</div>
                </div>
                <div class="result-body">
                    <div id="explanation" class="explanation-text"></div>
                </div>
            </div>

            <div class="result-card" style="border-color: var(--primary);">
                <div class="result-header">
                    <div class="label" style="margin:0;"><i data-lucide="code"></i> Código Fonte Senior (LSP)</div>
                    <button class="btn-copy" onclick="copyCode()">
                        <i data-lucide="copy"></i> Copiar Código
                    </button>
                </div>
                <div class="result-body" style="background: #010409;">
                    <pre id="code-content"></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        const btn = document.getElementById('generate-btn');
        const promptInput = document.getElementById('prompt');
        const resultsGrid = document.getElementById('results-grid');
        const loading = document.getElementById('loading');
        const errorToast = document.getElementById('error-toast');
        const explanationDiv = document.getElementById('explanation');
        const codePre = document.getElementById('code-content');

        btn.addEventListener('click', async () => {
            const text = promptInput.value.trim();
            if (!text) return;

            btn.disabled = true;
            loading.style.display = "block";
            resultsGrid.style.display = "none";
            errorToast.style.display = "none";

            try {
                const response = await fetch('/api/gerar-sql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Erro desconhecido');
                }

                const data = await response.json();
                const raw = data.resultado;

                const getTag = (tag) => {
                    const s = raw.indexOf("##" + tag + "##");
                    if (s === -1) return "";
                    const after = s + tag.length + 4;
                    const e = raw.indexOf("##", after);
                    return (e === -1 ? raw.slice(after) : raw.slice(after, e)).trim();
                };

                const explanation = getTag("EXPLICACOES");
                const code = getTag("CONTEUDO");

                if (!code && !explanation) {
                    explanationDiv.innerText = "Resposta não estruturada pela IA.";
                    codePre.innerText = raw;
                } else {
                    explanationDiv.innerText = explanation || "Sem explicações adicionais.";
                    codePre.innerText = code || "Nenhum código gerado.";
                }

                loading.style.display = "none";
                resultsGrid.style.display = "grid";
            } catch (err) {
                loading.style.display = "none";
                errorToast.innerText = "Falha Crítica: " + err.message;
                errorToast.style.display = "block";
            } finally {
                btn.disabled = false;
            }
        });

        function copyCode() {
            const code = document.getElementById('code-content').innerText;
            navigator.clipboard.writeText(code);
            alert("Código copiado para a área de transferência!");
        }
    </script>
</body>
</html>
